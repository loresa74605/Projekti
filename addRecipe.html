<header>
    <nav class="nav">
        <h2>TinyBites</h2>

<div class="searchbar" id="searchBar">
    <img src="searchh.png" alt="" class="imgsrch">
    <input type="text" id="searchInput" placeholder="Search recipes...">
</div>
<section class="contact-page">
    <div class="contact-wrapper">

        <div class="contact-left">
            <h1>Add a New Recipe</h1>
            <p class="subtitle">
                Fill in the details below to add your delicious recipe. 
                Include a photo, title, and description for best results!
            </p>
        </div>

        <div class="contact-right">
            <div class="contact-card">
                <h3>Recipe Form</h3>
                <form id="addRecipeForm" method="POST" action="addRecipe.php">
                    <label for="title">Recipe Title</label>
                    <input type="text" id="title" name="title" placeholder="Chocolate Cake" required>

                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Write a short description..." required></textarea>

                    <label for="image">Upload Image</label>
                    <input type="file" id="image" name="image" accept="image/*">

                    <button type="submit" class="submit-btn">Add Recipe</button>
                </form>
            </div>
        </div>

    </div>
</section>
